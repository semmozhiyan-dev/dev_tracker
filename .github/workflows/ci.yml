name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Cancel in-progress workflows when a new workflow is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test and Build

    steps:
      # Step 1: Checkout the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Python 3.11
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      # Step 3: Install dependencies from requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      # Step 4: Create a mock .env file for testing
      - name: Create .env file for testing
        run: |
          cat > .env << EOF
          GITHUB_USERNAME=testuser
          GITHUB_TOKEN=test_token_12345
          GROQ_API_KEY=test_groq_key
          DATABASE_URL=sqlite:///./test_devtrackr.db
          EOF

      # Step 5: Run FastAPI health check
      - name: Start FastAPI app and run health check
        run: |
          # Start the FastAPI app in the background
          python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          
          # Get the PID of the background process
          SERVER_PID=$!
          
          # Wait for the server to start
          echo "Waiting for FastAPI server to start..."
          sleep 3
          
          # Run health check
          echo "Running health check..."
          HEALTH_CHECK=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/)
          
          # Verify response
          if [ "$HEALTH_CHECK" -eq 200 ]; then
            echo "✓ Health check passed (HTTP $HEALTH_CHECK)"
          else
            echo "✗ Health check failed (HTTP $HEALTH_CHECK)"
            kill $SERVER_PID
            exit 1
          fi
          
          # Kill the background process
          kill $SERVER_PID
          echo "✓ FastAPI app shutdown complete"

      # Step 6: Run pytest (if tests exist)
      - name: Run unit tests (if available)
        run: |
          if [ -d "tests" ] && [ "$(ls -A tests)" ]; then
            pip install pytest pytest-asyncio
            pytest tests/ -v
          else
            echo "No tests found, skipping pytest"
          fi
        continue-on-error: true

      # Step 7: Build Docker image
      - name: Build Docker image
        run: |
          docker build -t devtrackr:${{ github.sha }} -t devtrackr:latest .
          echo "✓ Docker image built successfully"
          echo "Image tags:"
          docker images | grep devtrackr

      # Step 8: Test Docker image (optional - verify it runs)
      - name: Test Docker image
        run: |
          # Create test .env for container
          cat > .env.test << EOF
          GITHUB_USERNAME=testuser
          GITHUB_TOKEN=test_token_12345
          GROQ_API_KEY=test_groq_key
          DATABASE_URL=sqlite:///./data/test_devtrackr.db
          EOF
          
          # Run container with health check
          docker run -d \
            --name devtrackr-test \
            --env-file .env.test \
            -p 8001:8000 \
            devtrackr:latest
          
          # Wait for container to start
          sleep 3
          
          # Check if container is running
          if docker ps | grep -q devtrackr-test; then
            echo "✓ Docker container started successfully"
          else
            echo "✗ Docker container failed to start"
            docker logs devtrackr-test
            exit 1
          fi
          
          # Test endpoint
          CONTAINER_HEALTH=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8001/)
          
          # Clean up
          docker stop devtrackr-test
          docker rm devtrackr-test
          rm .env.test
          
          if [ "$CONTAINER_HEALTH" -eq 200 ]; then
            echo "✓ Docker container health check passed (HTTP $CONTAINER_HEALTH)"
          else
            echo "✗ Docker container health check failed (HTTP $CONTAINER_HEALTH)"
            exit 1
          fi

      # Step 9: Summary
      - name: Workflow summary
        if: success()
        run: |
          echo "✓ All checks passed!"
          echo "- Code checked out"
          echo "- Python 3.11 environment ready"
          echo "- Dependencies installed"
          echo "- FastAPI health check passed"
          echo "- Docker image built and tested"

      # Step 10: Failure summary
      - name: Workflow failure summary
        if: failure()
        run: |
          echo "✗ Workflow failed - see logs above for details"
          exit 1
